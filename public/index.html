<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>CatNames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #030f15;
    --red:   #fb2928;
    --blue:  #362be5;
    --lime:  #c6e14e;
    --lime2: #a8c83a;
    --white: #ffffff;
    --dark:  #191a1f;
    --card-r: 10px;
  }

  html, body {
    height: 100%;
    font-family: 'Roboto Condensed', 'Arial Narrow', Arial, sans-serif;
    background: var(--bg);
    color: var(--white);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    overflow-x: hidden;
  }

  body {
    display: flex; flex-direction: column; align-items: center;
    min-height: 100%;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 480px; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ── Decorative glow circles ── */
  .glow-red, .glow-blue {
    position: absolute; width: 280px; height: 280px;
    border-radius: 50%; pointer-events: none; z-index: 0;
  }
  .glow-red  { background: var(--red);  opacity: .18; filter: blur(70px); }
  .glow-blue { background: var(--blue); opacity: .22; filter: blur(70px); }

  /* ── Inputs ── */
  .inp {
    background: rgba(255,255,255,.07);
    border: 1.5px solid rgba(255,255,255,.15);
    border-radius: 12px;
    color: var(--white); font-family: inherit; font-size: 16px; font-weight: 400;
    padding: 14px 16px; outline: none; width: 100%;
    transition: border-color .2s;
  }
  .inp::placeholder { color: rgba(255,255,255,.3); }
  .inp:focus { border-color: var(--lime); }

  /* ── Buttons ── */
  .btn {
    font-family: inherit; font-size: 18px; font-weight: 800;
    border: none; border-radius: 14px; cursor: pointer;
    padding: 16px 20px; width: 100%; letter-spacing: .04em;
    transition: opacity .15s, transform .1s;
    text-transform: uppercase;
  }
  .btn:active { opacity: .82; transform: scale(.97); }
  .btn-lime  { background: var(--lime);  color: var(--dark); }
  .btn-outline {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,.2);
    color: var(--white);
  }
  .btn-sm { font-size: 14px; padding: 10px 16px; border-radius: 10px; }

  /* ── Divider ── */
  .divider { display: flex; align-items: center; gap: 10px; width: 100%; color: rgba(255,255,255,.3); font-size: 13px; }
  .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid rgba(255,255,255,.1); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,30,.95); color: var(--white);
    padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 700;
    opacity: 0; transition: opacity .25s, transform .25s; z-index: 9999;
    white-space: nowrap; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ═══════════════════════════════════════════
     HOME SCREEN
  ═══════════════════════════════════════════ */
  #screen-home {
    position: relative; overflow: hidden;
    justify-content: flex-end;
    padding: 0 20px 40px;
  }
  #screen-home .glow-red  { top: -60px; right: -80px; }
  #screen-home .glow-blue { bottom: 60px; left: -80px; }

  .home-top {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; z-index: 1; width: 100%;
    padding-top: 20px;
  }

  .home-logo {
    font-size: clamp(2.8rem, 14vw, 4.8rem); font-weight: 800;
    letter-spacing: .08em; color: var(--white);
    text-align: center; line-height: 1; margin-bottom: 4px;
    text-transform: uppercase;
  }
  .home-logo span { color: var(--lime); }

  .home-sub {
    font-size: 14px; font-weight: 300; letter-spacing: .1em;
    color: rgba(255,255,255,.45); text-transform: uppercase;
    text-align: center; margin-bottom: 0;
  }

  .heroes {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 0; width: 100%; max-width: 360px;
    margin: 12px auto 0;
  }
  .hero-img {
    width: 50%; max-width: 180px;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,.5));
  }
  .hero-img.cat { transform: scaleX(-1); }

  .home-form {
    display: flex; flex-direction: column; gap: 12px;
    width: 100%; position: relative; z-index: 1;
  }

  /* ═══════════════════════════════════════════
     LOBBY SCREEN
  ═══════════════════════════════════════════ */
  #screen-lobby {
    position: relative; overflow: hidden;
    padding: 0 16px 32px;
    gap: 0;
  }
  #screen-lobby .glow-red  { top: 20px; right: -80px; }
  #screen-lobby .glow-blue { bottom: 100px; left: -80px; }

  .lobby-header {
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 0 16px; position: relative; z-index: 1; width: 100%;
  }
  .lobby-title { font-size: 13px; font-weight: 400; color: rgba(255,255,255,.4); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px; }
  .lobby-code-row { display: flex; align-items: center; gap: 10px; }
  .lobby-code {
    font-size: 32px; font-weight: 800; letter-spacing: .18em; color: var(--white);
  }
  .btn-copy-code {
    background: rgba(255,255,255,.1); border: none; border-radius: 8px;
    color: rgba(255,255,255,.6); font-size: 12px; font-weight: 700;
    padding: 6px 12px; cursor: pointer; font-family: inherit;
    letter-spacing: .06em; text-transform: uppercase;
    transition: background .2s;
  }
  .btn-copy-code:active { background: rgba(255,255,255,.2); }

  /* QR Code */
  #qr-wrap {
    background: var(--white); border-radius: 16px; padding: 14px;
    margin: 4px 0 14px; display: none;
    position: relative; z-index: 1;
  }
  #qr-wrap.visible { display: block; }
  #qr-code canvas, #qr-code img { display: block; border-radius: 4px; }
  .qr-label { text-align: center; font-size: 11px; font-weight: 700; color: var(--dark); margin-top: 8px; letter-spacing: .08em; text-transform: uppercase; }

  /* Player list */
  .lobby-players-wrap { width: 100%; flex: 1; position: relative; z-index: 1; overflow-y: auto; }
  .lobby-status { font-size: 15px; font-weight: 800; color: rgba(255,255,255,.5); text-align: center; padding: 12px 0 8px; letter-spacing: .06em; text-transform: uppercase; }

  .player-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 12px;
    background: rgba(255,255,255,.05);
    margin-bottom: 6px;
    animation: slide-in .2s ease;
  }
  @keyframes slide-in { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:none; } }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: var(--dark);
    flex-shrink: 0; text-transform: uppercase;
  }
  .player-name { font-size: 16px; font-weight: 400; color: var(--white); }
  .player-offline { opacity: .4; }

  .lobby-footer { width: 100%; display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 1; padding-top: 12px; }

  /* ═══════════════════════════════════════════
     GAME SCREEN
  ═══════════════════════════════════════════ */
  #screen-game {
    background: linear-gradient(180deg, var(--bg) 0%, #060d22 60%, #08123a 100%);
    padding: 0; justify-content: flex-start; max-width: 100%;
  }

  /* Card grid – 3 columns */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    padding: 8px 8px 0;
    width: 100%;
  }

  /* Status bar cell spans 2 cols */
  .status-cell {
    grid-column: 1 / 3;
    background: rgba(255,255,255,.08);
    border-radius: var(--card-r);
    padding: 6px 10px;
    display: flex; flex-direction: column;
    justify-content: center; gap: 2px;
    min-height: 0;
  }
  .status-turn {
    font-size: 13px; font-weight: 800; text-transform: uppercase;
    letter-spacing: .04em; line-height: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .status-turn.mine { color: var(--lime); }
  .status-turn.theirs { color: rgba(255,255,255,.55); }
  .status-scores {
    display: flex; gap: 8px;
    font-size: 11px; font-weight: 700; letter-spacing: .04em;
  }
  .score-blue { color: #7a9fff; }
  .score-red  { color: #ff7a7a; }

  /* ── Card ── */
  .card {
    aspect-ratio: 120 / 76;
    border-radius: var(--card-r);
    position: relative;
    -webkit-transform-style: preserve-3d;
    transform-style: preserve-3d;
    perspective: 500px;
    cursor: default;
  }
  .card.clickable { cursor: pointer; }
  .card-inner {
    position: absolute; inset: 0;
    -webkit-transform-style: preserve-3d;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    border-radius: var(--card-r);
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.clickable:active .card-inner { transform: scale(.93); }
  .card.clickable.flipped:active .card-inner { transform: rotateY(180deg) scale(.93); }

  .card-front, .card-back {
    position: absolute; inset: 0;
    border-radius: var(--card-r);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    background-size: cover;
    background-position: center top;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    overflow: hidden;
  }
  .card-back { transform: rotateY(180deg); }

  /* Front: default card image */
  .card-front { background-image: url(/img/card-default.png); background-color: #e8e0d0; }

  /* Captain color hints on front */
  .card.hint-red    .card-front { background-image: url(/img/card-red1.png); }
  .card.hint-blue   .card-front { background-image: url(/img/card-blue1.png); }
  .card.hint-neutral .card-front { background-image: url(/img/card-neutral.png); }
  .card.hint-assassin .card-front { background-image: url(/img/card-death.png); }

  /* Back: revealed card by type */
  .card.revealed-red1     .card-back { background-image: url(/img/card-red1.png); }
  .card.revealed-red2     .card-back { background-image: url(/img/card-red2.png); }
  .card.revealed-red3     .card-back { background-image: url(/img/card-red3.png); }
  .card.revealed-blue1    .card-back { background-image: url(/img/card-blue1.png); }
  .card.revealed-blue2    .card-back { background-image: url(/img/card-blue2.png); }
  .card.revealed-neutral  .card-back { background-image: url(/img/card-neutral.png); }
  .card.revealed-assassin .card-back { background-image: url(/img/card-death.png); }

  /* Word label on card */
  .card-word {
    position: relative; z-index: 2;
    font-family: 'Roboto Condensed', sans-serif;
    font-size: clamp(.5rem, 2.8vw, .78rem);
    font-weight: 800; letter-spacing: .05em; text-transform: uppercase;
    text-align: center; line-height: 1.1;
    padding: 3px 6px 4px;
    width: 100%;
    /* Pill label with solid background for readability */
    background: rgba(255,255,255,.92);
    color: var(--dark);
    border-top: 1px solid rgba(0,0,0,.08);
  }
  /* Revealed back: dark background label */
  .card-back .card-word {
    background: rgba(0,0,0,.55);
    color: var(--white);
    border-top: none;
  }

  /* Deal animation */
  @keyframes deal-in {
    from { opacity: 0; transform: translateY(-12px) scale(.85); }
    to   { opacity: 1; transform: none; }
  }
  .card.dealing { animation: deal-in .35s ease both; }

  /* ── Game bottom bar ── */
  .game-bar {
    display: flex; gap: 8px; padding: 8px 8px;
    width: 100%; align-items: center;
  }
  #btn-end-turn { display: none; flex: 1; }
  #btn-restart  { display: none; }
  .btn-icon {
    background: rgba(255,255,255,.1); border: none; border-radius: 12px;
    color: var(--white); font-size: 18px; cursor: pointer;
    padding: 14px 16px;
    transition: background .15s;
  }
  .btn-icon:active { background: rgba(255,255,255,.2); }

  /* ── Win banner ── */
  #win-banner {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(3,15,21,.88);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px;
  }
  #win-banner.show { display: flex; }
  .win-title { font-size: clamp(2rem, 10vw, 3.2rem); font-weight: 800; text-transform: uppercase; letter-spacing: .08em; text-align: center; }
  .win-title.red  { color: var(--red); }
  .win-title.blue { color: #6a8fff; }
  .win-reason { font-size: 15px; font-weight: 400; color: rgba(255,255,255,.6); text-align: center; max-width: 280px; }
  #btn-win-restart { max-width: 280px; }

  /* ── Dossier overlay ── */
  #dossier {
    display: none;
    position: fixed; inset: 0; z-index: 900;
    background: rgba(3,15,21,.92);
    flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
  }
  #dossier.show { display: flex; }
  .dossier-card {
    background: linear-gradient(160deg, #0a1428, #06101e);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 20px; padding: 28px 24px;
    width: 100%; max-width: 320px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    animation: pop-in .35s ease;
  }
  @keyframes pop-in { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:none; } }
  .dossier-label { font-size: 11px; font-weight: 700; letter-spacing: .14em; color: rgba(255,255,255,.3); text-transform: uppercase; }
  .dossier-team { font-size: 2rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
  .dossier-team.red  { color: var(--red); }
  .dossier-team.blue { color: #6a8fff; }
  .dossier-role { font-size: 1.3rem; font-weight: 700; color: var(--lime); letter-spacing: .1em; text-transform: uppercase; }
  .dossier-desc { font-size: 14px; font-weight: 300; color: rgba(255,255,255,.6); text-align: center; line-height: 1.5; }
  #btn-dossier-ok { margin-top: 8px; max-width: 280px; }

  /* ── Confetti ── */
  .confetti {
    position: fixed; top: -10px; z-index: 800; pointer-events: none;
    width: 10px; height: 10px; border-radius: 50%;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── Pulse for active turn ── */
  @keyframes pulse-lime { 0%,100%{opacity:1} 50%{opacity:.6} }
  .status-turn.mine { animation: pulse-lime 2s ease-in-out infinite; }

  /* ── Players in game (panel) ── */
  #game-players-btn {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    background: rgba(255,255,255,.12); border: none; border-radius: 10px;
    color: var(--white); font-size: 18px; cursor: pointer;
    padding: 8px 10px;
  }
  #game-players-panel {
    display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 75%; max-width: 280px;
    background: #040e1a; z-index: 500; padding: 20px 16px;
    overflow-y: auto; box-shadow: -8px 0 30px rgba(0,0,0,.6);
    flex-direction: column; gap: 8px;
  }
  #game-players-panel.open { display: flex; }
  .panel-overlay {
    display: none; position: fixed; inset: 0; z-index: 499;
    background: rgba(0,0,0,.5);
  }
  .panel-overlay.open { display: block; }
  .panel-title { font-size: 14px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.4); margin-bottom: 4px; }
  .panel-team-label {
    font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
    padding: 6px 0 2px; margin-top: 4px;
  }
  .panel-team-label.red  { color: var(--red); }
  .panel-team-label.blue { color: #7a9fff; }
  </style>
</head>
<body>

<!-- ════════════════════════════
     HOME SCREEN
════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="glow-red"></div>
  <div class="glow-blue"></div>

  <div class="home-top">
    <div class="home-logo">Cat<span>Names</span></div>
    <div class="home-sub">Котики против Пёсиков</div>
    <div class="heroes">
      <img src="/img/hero-cat.png" class="hero-img cat" alt="cat">
      <img src="/img/hero-dog.png" class="hero-img dog" alt="dog">
    </div>
  </div>

  <div class="home-form">
    <input id="name-input" class="inp" type="text" placeholder="Ваше имя" maxlength="20" autocomplete="off"/>
    <!-- Shown only when joining via invite link -->
    <div id="url-join-section" style="display:none; flex-direction:column; gap:10px">
      <input id="room-url-input" class="inp" type="text" maxlength="6"
             style="text-transform:uppercase;letter-spacing:.2em;font-weight:700;font-size:1.1rem;text-align:center" readonly/>
      <button class="btn btn-lime" onclick="doJoinUrl()">Войти в комнату</button>
    </div>
    <!-- Shown when no invite link (normal home screen) -->
    <div id="create-section" style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-lime" onclick="doCreate()">Создать игру</button>
      <div class="divider">или</div>
      <input id="room-manual-input" class="inp" type="text" placeholder="КОД КОМНАТЫ"
             maxlength="6" autocomplete="off"
             style="text-transform:uppercase;letter-spacing:.14em;font-weight:700;text-align:center"/>
      <button class="btn btn-outline" onclick="doJoinManual()">Войти по коду</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════
     LOBBY SCREEN
════════════════════════════ -->
<div id="screen-lobby" class="screen">
  <div class="glow-red" style="top:-40px;right:-80px"></div>
  <div class="glow-blue" style="bottom:80px;left:-80px"></div>

  <div class="lobby-header">
    <div class="lobby-title">Код комнаты</div>
    <div class="lobby-code-row">
      <div class="lobby-code" id="lobby-code">——</div>
      <button class="btn-copy-code" onclick="copyCode()">Копировать</button>
    </div>
  </div>

  <div id="qr-wrap">
    <div id="qr-code"></div>
    <div class="qr-label">Сканируй для подключения</div>
  </div>

  <div class="lobby-players-wrap">
    <div id="lobby-status" class="lobby-status">Ожидаем игроков...</div>
    <div id="lobby-players"></div>
  </div>

  <div class="lobby-footer">
    <button class="btn btn-lime" id="btn-start" style="display:none" onclick="socket.emit('start')">Начать игру</button>
    <button class="btn btn-outline btn-sm" id="btn-waiting" style="display:none" disabled>Ожидайте начала игры...</button>
  </div>
</div>

<!-- ════════════════════════════
     GAME SCREEN
════════════════════════════ -->
<div id="screen-game" class="screen">
  <div class="game-grid" id="game-grid"></div>
  <div class="game-bar">
    <button class="btn btn-lime" id="btn-end-turn" onclick="socket.emit('end_turn')">Завершить ход</button>
    <button class="btn-icon" id="btn-restart" onclick="socket.emit('restart')" title="Новая игра">↺</button>
    <button class="btn-icon" onclick="togglePanel()">☰</button>
  </div>
</div>

<!-- ════════════════════════════
     PLAYERS PANEL (slide)
════════════════════════════ -->
<div class="panel-overlay" id="panel-overlay" onclick="togglePanel()"></div>
<div id="game-players-panel">
  <div class="panel-title">Игроки</div>
  <div id="panel-players"></div>
</div>

<!-- ════════════════════════════
     DOSSIER OVERLAY
════════════════════════════ -->
<div id="dossier">
  <div class="dossier-card">
    <div class="dossier-label">Ваша команда</div>
    <div class="dossier-team" id="dossier-team">—</div>
    <div class="dossier-role" id="dossier-role">—</div>
    <div class="dossier-desc" id="dossier-desc"></div>
    <button class="btn btn-lime" id="btn-dossier-ok" onclick="closeDossier()">Понятно!</button>
  </div>
</div>

<!-- ════════════════════════════
     WIN BANNER
════════════════════════════ -->
<div id="win-banner">
  <div class="win-title" id="win-title">—</div>
  <div class="win-reason" id="win-reason"></div>
  <button class="btn btn-lime" id="btn-win-restart" style="display:none" onclick="socket.emit('restart')">Сыграть снова</button>
</div>

<!-- ════════════════════════════
     TOAST
════════════════════════════ -->
<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════════════
//  SOCKET
// ══════════════════════════════════════════════════════
const socket = io({ transports: ['websocket'] });

let myTeam = null, myRole = null, isHost = false, myName = null, myRoomId = null;
let prevRevealed = [];
let dossierDone  = false;
let qrGenerated  = false;

// ── URL room param ──
const urlRoom = new URLSearchParams(location.search).get('room');
if (urlRoom) {
  document.getElementById('room-url-input').value = urlRoom.toUpperCase();
  document.getElementById('url-join-section').style.display = 'flex';
  document.getElementById('create-section').style.display   = 'none';
}

// ══════════════════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════════════
//  AVATAR
// ══════════════════════════════════════════════════════
const AVATAR_COLORS = ['#c6e14e','#4ee1cd','#ab4ee1','#9c77eb','#4ee16e','#eb77a2','#e1a84e','#4e8fe1'];
function avatarColor(name) {
  let h = 0;
  for (const c of (name || '?')) h = (h * 31 + c.charCodeAt(0)) & 0x7fffffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function avatarEl(name, size = 36) {
  const d = document.createElement('div');
  d.className = 'avatar';
  d.style.cssText = `background:${avatarColor(name)};width:${size}px;height:${size}px;font-size:${Math.round(size*0.38)}px`;
  d.textContent = (name || '?')[0].toUpperCase();
  return d;
}

// ══════════════════════════════════════════════════════
//  NAME HELPER
// ══════════════════════════════════════════════════════
function getName() {
  const n = document.getElementById('name-input').value.trim();
  if (!n) { showToast('Введите ваше имя'); return null; }
  return n;
}

// ══════════════════════════════════════════════════════
//  COPY HELPERS
// ══════════════════════════════════════════════════════
function copyCode() {
  const code = document.getElementById('lobby-code').textContent;
  const inviteUrl = `${location.origin}/?room=${code}`;
  navigator.clipboard.writeText(inviteUrl).then(() => showToast('Ссылка скопирована!'));
}

// ══════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════
function doCreate() {
  const name = getName(); if (!name) return;
  myName = name; socket.emit('create', { name });
}
function doJoinUrl() {
  const name = getName(); if (!name) return;
  myName = name; socket.emit('join', { roomId: urlRoom.toUpperCase(), name });
}
function doJoinManual() {
  const name = getName(); if (!name) return;
  const rid = document.getElementById('room-manual-input').value.trim().toUpperCase();
  if (!rid) { showToast('Введите код комнаты'); return; }
  myName = name; socket.emit('join', { roomId: rid, name });
}

// ══════════════════════════════════════════════════════
//  DOSSIER
// ══════════════════════════════════════════════════════
function showDossier(team, role) {
  const teamName = team === 'red' ? 'Пёсики' : 'Котики';
  document.getElementById('dossier-team').textContent = teamName;
  document.getElementById('dossier-team').className = 'dossier-team ' + team;
  document.getElementById('dossier-role').textContent = role === 'captain' ? 'Капитан' : 'Агент';
  document.getElementById('dossier-desc').textContent = role === 'captain'
    ? 'Вы видите цвета всех карт. Давайте подсказки вслух — одно слово команде.'
    : 'Слушайте капитана и открывайте карты.';
  document.getElementById('dossier').classList.add('show');
}
function closeDossier() {
  document.getElementById('dossier').classList.remove('show');
  dossierDone = true;
}

// ══════════════════════════════════════════════════════
//  PLAYERS PANEL
// ══════════════════════════════════════════════════════
function togglePanel() {
  document.getElementById('game-players-panel').classList.toggle('open');
  document.getElementById('panel-overlay').classList.toggle('open');
}

// ══════════════════════════════════════════════════════
//  QR CODE
// ══════════════════════════════════════════════════════
function generateQR(url) {
  if (qrGenerated) return;
  qrGenerated = true;
  const el = document.getElementById('qr-code');
  el.innerHTML = '';
  new QRCode(el, {
    text: url, width: 180, height: 180,
    colorDark: '#030f15', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });
  document.getElementById('qr-wrap').classList.add('visible');
}

// ══════════════════════════════════════════════════════
//  CARD IMAGE
// ══════════════════════════════════════════════════════
function revealedClass(type, fig) {
  if (type === 'red') {
    const v = (fig % 3) + 1;
    return 'revealed-red' + v;
  }
  if (type === 'blue')     return 'revealed-blue' + ((fig % 2) + 1);
  if (type === 'neutral')  return 'revealed-neutral';
  if (type === 'assassin') return 'revealed-assassin';
  return '';
}

// ══════════════════════════════════════════════════════
//  SOCKET EVENTS
// ══════════════════════════════════════════════════════
socket.on('joined', ({ roomId, isHost: h }) => {
  isHost = h; myRoomId = roomId;
  qrGenerated = false;
  document.getElementById('lobby-code').textContent = roomId;
  document.getElementById('btn-start').style.display   = h ? '' : 'none';
  document.getElementById('btn-waiting').style.display = h ? 'none' : '';
  if (h) generateQR(`${location.origin}/?room=${roomId}`);
  showScreen('lobby');
});

socket.on('lobby', ({ players, hostName }) => {
  const el = document.getElementById('lobby-players');
  el.innerHTML = '';
  document.getElementById('lobby-status').textContent =
    `${players.length} ${players.length === 1 ? 'игрок' : players.length < 5 ? 'игрока' : 'игроков'} в комнате`;
  players.forEach(p => {
    const item = document.createElement('div');
    item.className = 'player-item';
    item.appendChild(avatarEl(p.name));
    const nameEl = document.createElement('div');
    nameEl.className = 'player-name';
    nameEl.textContent = p.name + (p.name === hostName ? ' 👑' : '');
    item.appendChild(nameEl);
    el.appendChild(item);
  });
});

socket.on('game_started', () => {
  dossierDone = false;
  prevRevealed = [];
  document.getElementById('win-banner').classList.remove('show');
  showScreen('game');
  const grid = document.getElementById('game-grid');
  grid.innerHTML = '';
  // Create status cell + 25 card placeholders
  const statusCell = document.createElement('div');
  statusCell.className = 'status-cell';
  statusCell.id = 'status-cell';
  grid.appendChild(statusCell);
  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div');
    el.className = 'card dealing';
    el.style.animationDelay = `${i * 30}ms`;
    el.innerHTML = `<div class="card-inner"><div class="card-front"><span class="card-word"></span></div><div class="card-back"><span class="card-word"></span></div></div>`;
    grid.appendChild(el);
  }
});

socket.on('state', data => {
  const { cards, currentTeam, redLeft, blueLeft, winner, winReason, myTeam: mt, myRole: mr, players } = data;
  myTeam = mt; myRole = mr;

  if (!dossierDone && mt && mr) showDossier(mt, mr);

  updateStatusCell(currentTeam, redLeft, blueLeft, mt);
  updateGameBar(currentTeam, mt, mr, winner);
  updatePanelPlayers(players);

  const grid = document.getElementById('game-grid');
  // grid.children[0] = status cell; [1..25] = cards
  cards.forEach((card, i) => {
    const el = grid.children[i + 1];
    if (!el) return;
    const front = el.querySelector('.card-front');
    const back  = el.querySelector('.card-back');
    const wasRevealed = prevRevealed[i];
    const nowRevealed = card.revealed;

    // Remove old state classes
    el.className = el.className.replace(/\b(hint|revealed|clickable|flipped)-?\S*/g, '').trim();
    el.classList.remove('dealing');

    // Assign revealed class
    if (nowRevealed) {
      const rc = revealedClass(card.type, card.fig);
      if (rc) el.classList.add(rc);
    }

    // Captain hint
    if (!nowRevealed && card.type !== 'unknown') {
      el.classList.add('hint-' + card.type);
    }

    // Words
    front.querySelector('.card-word').textContent = card.word;
    back.querySelector('.card-word').textContent  = card.word;

    // Flip
    if (nowRevealed && !wasRevealed) {
      el.classList.remove('flipped');
      void el.offsetWidth;
      el.classList.add('flipped');
    } else if (nowRevealed) {
      el.classList.add('flipped');
    }

    // Clickable
    el.onclick = null;
    if (!winner && !nowRevealed && currentTeam === mt) {
      const teamSize = players.filter(p => p.team === mt).length;
      if (mr === 'operative' || teamSize <= 1) {
        el.classList.add('clickable');
        el.onclick = () => socket.emit('reveal', { index: i });
      }
    }
  });

  prevRevealed = cards.map(c => c.revealed);

  if (winner) showWin(winner, winReason);
});

socket.on('err', showToast);

// ══════════════════════════════════════════════════════
//  UI UPDATES
// ══════════════════════════════════════════════════════
function updateStatusCell(currentTeam, redLeft, blueLeft, mt) {
  const cell = document.getElementById('status-cell');
  if (!cell) return;
  const isMine = currentTeam === mt;
  const teamName = currentTeam === 'red' ? 'Пёсики 🐶' : 'Котики 🐱';
  cell.innerHTML = `
    <div class="status-turn ${isMine ? 'mine' : 'theirs'}">Ходят ${teamName}</div>
    <div class="status-scores">
      <span class="score-blue">🐱 ${blueLeft}</span>
      <span class="score-red">🐶 ${redLeft}</span>
    </div>`;
}

function updateGameBar(currentTeam, mt, mr, winner) {
  const endBtn  = document.getElementById('btn-end-turn');
  const restBtn = document.getElementById('btn-restart');
  endBtn.style.display  = (!winner && currentTeam === mt) ? '' : 'none';
  restBtn.style.display = (isHost) ? '' : 'none';
}

function updatePanelPlayers(players) {
  const el = document.getElementById('panel-players');
  el.innerHTML = '';
  const blues = players.filter(p => p.team === 'blue');
  const reds  = players.filter(p => p.team === 'red');

  if (blues.length) {
    const lbl = document.createElement('div');
    lbl.className = 'panel-team-label blue';
    lbl.textContent = 'Котики 🐱';
    el.appendChild(lbl);
    blues.forEach(p => el.appendChild(makePlayerItem(p)));
  }
  if (reds.length) {
    const lbl = document.createElement('div');
    lbl.className = 'panel-team-label red';
    lbl.textContent = 'Пёсики 🐶';
    el.appendChild(lbl);
    reds.forEach(p => el.appendChild(makePlayerItem(p)));
  }
  if (!blues.length && !reds.length) {
    players.forEach(p => el.appendChild(makePlayerItem(p)));
  }
}

function makePlayerItem(p) {
  const item = document.createElement('div');
  item.className = 'player-item' + (p.online === false ? ' player-offline' : '');
  item.appendChild(avatarEl(p.name, 30));
  const nameEl = document.createElement('div');
  nameEl.className = 'player-name';
  nameEl.style.fontSize = '14px';
  nameEl.textContent = p.name + (p.role === 'captain' ? ' 👑' : '');
  item.appendChild(nameEl);
  return item;
}

// ══════════════════════════════════════════════════════
//  WIN
// ══════════════════════════════════════════════════════
function showWin(winner, reason) {
  const banner = document.getElementById('win-banner');
  const title  = document.getElementById('win-title');
  title.textContent = winner === 'red' ? '🐶 Пёсики победили!' : '🐱 Котики победили!';
  title.className = 'win-title ' + winner;
  document.getElementById('win-reason').textContent = reason;
  document.getElementById('btn-win-restart').style.display = isHost ? '' : 'none';
  banner.classList.add('show');
  launchConfetti(winner);
}

function launchConfetti(winner) {
  const colors = winner === 'red'
    ? ['#fb2928','#ff6b6b','#ff9999','#ffcccc']
    : ['#362be5','#6a8fff','#99b3ff','#ccd9ff'];
  for (let i = 0; i < 60; i++) {
    const d = document.createElement('div');
    d.className = 'confetti';
    d.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[(Math.random()*colors.length)|0]};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      border-radius:${Math.random() > .5 ? '50%' : '2px'};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*.8}s;
    `;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 4000);
  }
}

// ══════════════════════════════════════════════════════
//  INPUT HELPERS
// ══════════════════════════════════════════════════════
document.getElementById('room-manual-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doJoinManual();
});
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (urlRoom) doJoinUrl();
    else doCreate();
  }
});
</script>
